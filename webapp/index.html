<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crypto Tracker</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1620;
    --panel:#161F2C;
    --panel-2:#1D2836;
    --border: rgba(237,234,226,0.08);
    --border-strong: rgba(237,234,226,0.16);
    --text:#EDEAE2;
    --text-muted: rgba(237,234,226,0.58);
    --amber:#E8A23D;
    --amber-dim: rgba(232,162,61,0.14);
    --teal:#4FB3A9;
    --gain:#6FCF8F;
    --gain-dim: rgba(111,207,143,0.14);
    --loss:#E1604F;
    --loss-dim: rgba(225,96,79,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Sora', sans-serif;
    background:var(--ink);
    color:var(--text);
    overscroll-behavior-y:none;
    padding-bottom:78px;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
  input{font-family:inherit; color:inherit;}
  a{color:inherit;}
  ::-webkit-scrollbar{display:none;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  button:focus-visible, input:focus-visible{
    outline:2px solid var(--amber);
    outline-offset:2px;
  }

  /* ─── Тикерная лента (signature element) ─── */
  .ticker-wrap{
    background:var(--panel);
    border-bottom:1px solid var(--border);
    overflow:hidden;
    padding:10px 0;
    position:sticky; top:0; z-index:30;
  }
  .ticker-track{
    display:flex; gap:28px; width:max-content;
    animation:scroll-ticker 28s linear infinite;
  }
  @keyframes scroll-ticker{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }
  .ticker-item{
    display:flex; align-items:center; gap:8px;
    font-family:'JetBrains Mono', monospace; font-size:0.82rem;
    white-space:nowrap;
  }
  .ticker-item .sym{color:var(--text-muted); font-weight:500;}
  .ticker-item .val{color:var(--text); font-weight:600;}
  .ticker-item .chg.up{color:var(--gain);}
  .ticker-item .chg.down{color:var(--loss);}

  main{padding:18px 16px 24px;}
  .screen{display:none;}
  .screen.active{display:block; animation:fade-in .25s ease;}
  @keyframes fade-in{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  @keyframes card-in{from{opacity:0; transform:translateY(10px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes pulse-dot{0%,100%{opacity:1; transform:scale(1);} 50%{opacity:0.4; transform:scale(0.7);}}
  @keyframes glow-pulse{0%,100%{box-shadow:0 8px 20px rgba(232,162,61,0.35);} 50%{box-shadow:0 8px 28px rgba(232,162,61,0.6);}}
  button, .chip, .toggle-btn, .coin-row, .tab-btn, .del-btn, .star-btn{
    transition:transform .12s ease, background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease;
  }
  button:active, .chip:active, .toggle-btn:active, .del-btn:active, .star-btn:active{transform:scale(0.94);}

  h1{font-size:1.3rem; font-weight:700; margin-bottom:4px;}
  .subtitle{color:var(--text-muted); font-size:0.86rem; margin-bottom:18px;}

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    margin-bottom:14px;
    transition:border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  @media (hover:hover){
    .card:hover{border-color:var(--border-strong); transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,0.25);}
  }

  /* ─── Movers row ─── */
  .movers-row{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;}
  .mover-card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:14px; transition:border-color .2s ease, transform .15s ease;
    animation:card-in .4s ease backwards;
  }
  .mover-card:active{transform:scale(0.97);}
  .mover-card.gain{border-color:rgba(111,207,143,0.25);}
  .mover-card.loss{border-color:rgba(225,96,79,0.25);}
  .mover-card .label{font-size:0.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px;}
  .mover-card .sym{font-weight:700; font-size:1.05rem; margin-bottom:2px;}
  .mover-card .chg{font-family:'JetBrains Mono', monospace; font-size:0.95rem; font-weight:600;}
  .mover-card.gain .chg{color:var(--gain);}
  .mover-card.loss .chg{color:var(--loss);}

  /* ─── Market list ─── */
  .section-title{
    font-size:0.78rem; color:var(--text-muted); text-transform:uppercase;
    letter-spacing:0.08em; margin:20px 0 10px; font-weight:600;
  }
  .coin-row{
    display:flex; align-items:center; gap:12px;
    padding:13px 4px; border-bottom:1px solid var(--border);
    cursor:pointer;
    animation:card-in .35s ease backwards;
    transition:background .15s ease;
  }
  .coin-row:active{background:var(--panel-2);}
  .coin-row:last-child{border-bottom:none;}
  .star-btn{
    width:22px; height:22px; flex-shrink:0; color:var(--text-muted);
    display:flex; align-items:center; justify-content:center;
  }
  .star-btn.active{color:var(--amber);}
  .star-btn svg{width:17px; height:17px;}
  .coin-info{flex:1; min-width:0;}
  .coin-info .sym{font-weight:600; font-size:0.98rem;}
  .coin-price-block{text-align:right;}
  .coin-price-block .price{font-family:'JetBrains Mono', monospace; font-weight:600; font-size:0.94rem;}
  .coin-price-block .chg{font-family:'JetBrains Mono', monospace; font-size:0.8rem; margin-top:2px;}
  .chg.up{color:var(--gain);} .chg.down{color:var(--loss);}
  .chevron{width:16px; color:var(--text-muted); flex-shrink:0; transition:transform .2s ease;}
  .chevron.open{transform:rotate(90deg);}
  .chart-panel{
    max-height:0; overflow:hidden; transition:max-height .3s ease;
  }
  .chart-panel.open{max-height:180px; padding:10px 0 6px;}
  .chart-panel canvas{max-height:150px;}

  /* ─── Portfolio ─── */
  .total-value{
    font-family:'JetBrains Mono', monospace; font-weight:700; font-size:2.1rem;
    margin:4px 0 2px;
  }
  .total-label{color:var(--text-muted); font-size:0.82rem;}
  .donut-wrap{display:flex; align-items:center; gap:18px; margin:16px 0 4px;}
  .donut-wrap canvas{width:110px !important; height:110px !important;}
  .legend{flex:1; display:flex; flex-direction:column; gap:8px;}
  .legend-item{display:flex; align-items:center; gap:8px; font-size:0.84rem;}
  .legend-dot{width:9px; height:9px; border-radius:50%; flex-shrink:0;}
  .legend-item .sym{font-weight:600; margin-right:auto;}
  .legend-item .pct{font-family:'JetBrains Mono', monospace; color:var(--text-muted);}

  .item-row{
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 0; border-bottom:1px solid var(--border);
    animation:card-in .35s ease backwards;
  }
  .item-row:last-child{border-bottom:none;}
  .item-row .left .sym{font-weight:600; font-size:0.95rem;}
  .item-row .left .sub{color:var(--text-muted); font-size:0.78rem; margin-top:2px; font-family:'JetBrains Mono', monospace;}
  .item-row .right{text-align:right; display:flex; align-items:center; gap:12px;}
  .item-row .val{font-family:'JetBrains Mono', monospace; font-weight:600;}
  .del-btn{
    width:28px; height:28px; border-radius:8px; background:var(--panel-2);
    display:flex; align-items:center; justify-content:center; color:var(--text-muted);
    flex-shrink:0;
  }
  .del-btn svg{width:14px; height:14px;}
  .del-btn:hover{color:var(--loss);}

  .empty-state{
    text-align:center; padding:36px 16px; color:var(--text-muted);
  }
  .empty-state .big-icon{width:40px; height:40px; margin:0 auto 14px; opacity:0.5;}
  .empty-state p{font-size:0.9rem; margin-bottom:16px;}

  .fab{
    position:fixed; right:18px; bottom:96px; z-index:20;
    width:52px; height:52px; border-radius:16px;
    background:var(--ink); color:var(--amber);
    border:1.5px solid var(--amber);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(232,162,61,0.35);
    animation:glow-pulse 2.6s ease-in-out infinite;
  }
  .fab:active{transform:scale(0.92);}
  .fab svg{width:22px; height:22px;}
  .fab.hidden{display:none;}

  /* ─── Sheet (bottom modal) ─── */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:40;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sheet-backdrop.open{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:41;
    background:var(--panel); border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(100%); transition:transform .25s ease;
    max-height:80vh; overflow-y:auto;
  }
  .sheet.open{transform:translateY(0);}
  .sheet-handle{width:36px; height:4px; background:var(--border-strong); border-radius:2px; margin:0 auto 16px;}
  .sheet h3{font-size:1.05rem; margin-bottom:16px;}

  .chip-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;}
  .chip{
    padding:9px 14px; border-radius:10px; background:transparent;
    border:1px solid var(--border); font-size:0.86rem; font-weight:500;
    color:var(--text-muted);
  }
  .chip.selected{
    background:var(--amber-dim); border-color:var(--amber); color:var(--amber);
    box-shadow:0 0 0 1px var(--amber), 0 0 14px rgba(232,162,61,0.35);
  }

  .field-label{font-size:0.78rem; color:var(--text-muted); margin-bottom:8px; display:block;}
  .text-input{
    width:100%; background:var(--panel-2); border:1px solid var(--border);
    border-radius:10px; padding:13px 14px; font-size:1rem; margin-bottom:16px;
    font-family:'JetBrains Mono', monospace;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .text-input:focus{border-color:var(--amber); box-shadow:0 0 0 3px var(--amber-dim);}

  .toggle-row{display:flex; gap:8px; margin-bottom:20px;}
  .toggle-btn{
    flex:1; padding:12px; border-radius:10px; background:transparent;
    border:1px solid var(--border); font-size:0.88rem; font-weight:600;
    color:var(--text-muted); display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .toggle-btn.selected.above{
    background:var(--gain-dim); border-color:var(--gain); color:var(--gain);
    box-shadow:0 0 0 1px var(--gain), 0 0 14px rgba(111,207,143,0.3);
  }
  .toggle-btn.selected.below{
    background:var(--loss-dim); border-color:var(--loss); color:var(--loss);
    box-shadow:0 0 0 1px var(--loss), 0 0 14px rgba(225,96,79,0.3);
  }

  .btn-primary{
    width:100%; padding:15px; border-radius:12px;
    background:transparent; color:var(--amber); font-weight:700; font-size:0.98rem;
    border:1.5px solid var(--amber);
    box-shadow:0 0 16px rgba(232,162,61,0.18);
  }
  .btn-primary:active{background:var(--amber-dim); box-shadow:0 0 22px rgba(232,162,61,0.4);}
  .btn-primary:disabled{opacity:0.45;}
  .btn-secondary{
    width:100%; padding:15px; border-radius:12px; margin-top:10px;
    background:transparent; color:var(--text); font-weight:600; font-size:0.95rem;
    border:1px solid var(--border);
  }

  /* ─── Calculator ─── */
  .calc-result{margin-top:18px;}
  .calc-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 0; border-bottom:1px solid var(--border);
  }
  .calc-row:last-child{border-bottom:none;}
  .calc-row .sym{font-weight:600; font-size:0.92rem;}
  .calc-row .amount{font-family:'JetBrains Mono', monospace; font-weight:600;}
  .limit-note{
    text-align:center; font-size:0.8rem; color:var(--text-muted); margin-top:14px;
  }

  /* ─── Premium ─── */
  .premium-hero{
    background:linear-gradient(155deg, var(--amber-dim), transparent 60%);
    border:1px solid var(--border);
    border-radius:16px; padding:24px 20px; margin-bottom:18px; text-align:center;
  }
  .premium-hero .gem{width:36px; height:36px; color:var(--amber); margin:0 auto 12px;}
  .premium-hero .price{font-family:'JetBrains Mono', monospace; font-size:2rem; font-weight:700; margin:8px 0 2px;}
  .premium-hero .price span{font-size:1rem; color:var(--text-muted); font-weight:500;}
  .feature-list{display:flex; flex-direction:column; gap:12px; margin-bottom:20px;}
  .feature-item{display:flex; align-items:center; gap:12px; font-size:0.9rem;}
  .feature-item .check{width:20px; height:20px; flex-shrink:0; color:var(--gain);}
  .referral-card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:18px; margin-top:14px;
  }
  .referral-title{font-weight:700; font-size:1rem; margin-bottom:4px;}
  .referral-sub{color:var(--text-muted); font-size:0.85rem; margin-bottom:14px; line-height:1.4;}
  .referral-link-row{
    display:flex; align-items:center; gap:8px;
    background:var(--panel-2); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; margin-bottom:12px;
  }
  .referral-link{
    flex:1; font-size:0.78rem; color:var(--amber);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .referral-copy-btn{
    background:var(--amber-dim); color:var(--amber); font-weight:600; font-size:0.78rem;
    padding:7px 12px; border-radius:8px; flex-shrink:0;
    font-family:'Sora', sans-serif;
  }
  .referral-count{font-size:0.85rem; color:var(--text-muted);}
  .referral-count strong{color:var(--text);}
  .active-badge{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--gain-dim); color:var(--gain); padding:6px 12px;
    border-radius:8px; font-size:0.82rem; font-weight:600; margin-bottom:8px;
  }

  /* ─── Loading / toast ─── */
  .spinner{
    width:22px; height:22px; border-radius:50%;
    border:2.5px solid var(--border-strong); border-top-color:var(--amber);
    animation:spin .7s linear infinite; margin:24px auto;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(20px);
    background:var(--panel-2); border:1px solid var(--border-strong); color:var(--text);
    padding:12px 18px; border-radius:12px; font-size:0.86rem; z-index:60;
    opacity:0; transition:all .25s ease; pointer-events:none; max-width:88%;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* ─── Bottom tab bar ─── */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:var(--panel); border-top:1px solid var(--border);
    display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  }
  .tab-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 2px; color:var(--text-muted); border-radius:10px;
    position:relative;
  }
  .tab-btn svg{width:21px; height:21px; transition:transform .2s ease;}
  .tab-btn span{font-size:0.66rem; font-weight:600;}
  .tab-btn.active{color:var(--amber);}
  .tab-btn.active svg{transform:translateY(-1px);}
  .tab-btn.active::before{
    content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:22px; height:2px; border-radius:2px; background:var(--amber);
    box-shadow:0 0 8px var(--amber);
    animation:tab-indicator .2s ease;
  }
  @keyframes tab-indicator{from{width:0; opacity:0;} to{width:22px; opacity:1;}}

  .coin-row:nth-child(1),.item-row:nth-child(1),.mover-card:nth-child(1){animation-delay:0s;}
  .coin-row:nth-child(2),.item-row:nth-child(2),.mover-card:nth-child(2){animation-delay:.04s;}
  .coin-row:nth-child(3),.item-row:nth-child(3){animation-delay:.08s;}
  .coin-row:nth-child(4),.item-row:nth-child(4){animation-delay:.12s;}
  .coin-row:nth-child(5),.item-row:nth-child(5){animation-delay:.16s;}
  .coin-row:nth-child(6),.item-row:nth-child(6){animation-delay:.2s;}
  .coin-row:nth-child(n+7),.item-row:nth-child(n+7){animation-delay:.24s;}

  .live-dot{
    display:inline-block; width:7px; height:7px; border-radius:50%;
    background:var(--gain); margin-right:6px; vertical-align:middle;
    animation:pulse-dot 1.6s ease-in-out infinite;
    box-shadow:0 0 6px var(--gain);
  }

  /* ─── Кнопка админ-профиля ─── */
  .admin-fab{
    position:fixed; top:calc(10px + env(safe-area-inset-top)); right:14px; z-index:30;
    width:36px; height:36px; border-radius:50%;
    background:var(--panel); border:1px solid var(--border-strong);
    color:var(--amber);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.3);
  }
  .admin-fab svg{width:18px; height:18px;}
  .admin-fab.hidden{display:none;}
  .admin-fab:active{transform:scale(0.92);}

  .admin-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
  .admin-stat-card{
    background:var(--panel-2); border:1px solid var(--border); border-radius:12px; padding:14px;
  }
  .admin-stat-card .num{font-family:'JetBrains Mono', monospace; font-weight:700; font-size:1.4rem; color:var(--amber);}
  .admin-stat-card .lbl{font-size:0.76rem; color:var(--text-muted); margin-top:2px;}
  .online-row{
    display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);
  }
  .online-row:last-child{border-bottom:none;}
  .online-row .live-dot{margin-right:0;}
  .online-row .uname{font-weight:600; font-size:0.9rem;}
  .online-row .ago{margin-left:auto; font-family:'JetBrains Mono', monospace; font-size:0.76rem; color:var(--text-muted);}

  /* ─── Сюрприз ─── */
  .surprise-overlay{
    position:fixed; inset:0; z-index:80;
    background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .surprise-overlay.show{opacity:1; pointer-events:auto;}
  .surprise-overlay.hidden{display:none;}
  .surprise-box{
    width:210px; height:210px; border-radius:20px; overflow:hidden;
    border:1.5px solid var(--amber);
    box-shadow:0 0 40px rgba(232,162,61,0.5);
    animation:surprise-pop .4s cubic-bezier(.2,1.4,.4,1);
  }
  .surprise-box img{width:100%; height:100%; object-fit:cover;}
  @keyframes surprise-pop{from{transform:scale(0.6); opacity:0;} to{transform:scale(1); opacity:1;}}
</style>
</head>
<body>

<div class="ticker-wrap">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<button class="admin-fab hidden" id="adminProfileBtn" title="Админ-панель">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
</button>

<div class="surprise-overlay hidden" id="surpriseOverlay">
  <div class="surprise-box">
    <img src="/assets/surprise.jpg" alt="">
  </div>
</div>

<main>

  <!-- ─── DASHBOARD ─── -->
  <section class="screen active" id="screen-dashboard">
    <h1 id="dashGreeting">Рынок</h1>
    <p class="subtitle" id="dashSubtitle"><span class="live-dot"></span>Курсы обновляются каждые 30 секунд</p>

    <div class="movers-row" id="moversRow"></div>

    <div class="section-title">Все монеты</div>
    <div class="card" id="marketList" style="padding:4px 14px;"></div>
  </section>

  <!-- ─── PORTFOLIO ─── -->
  <section class="screen" id="screen-portfolio">
    <h1>Портфель</h1>
    <p class="subtitle">Стоимость активов по текущему курсу</p>
    <div id="portfolioContent"></div>
  </section>

  <!-- ─── ALERTS ─── -->
  <section class="screen" id="screen-alerts">
    <h1>Уведомления</h1>
    <p class="subtitle">Сообщим, когда цена достигнет цели</p>
    <div id="alertsContent"></div>
  </section>

  <!-- ─── CALCULATOR ─── -->
  <section class="screen" id="screen-calc">
    <h1>Калькулятор</h1>
    <p class="subtitle">Конвертация между монетами и USD</p>
    <div class="card">
      <span class="field-label">Из какой валюты</span>
      <div class="chip-row" id="calcCoinChips"></div>
      <span class="field-label">Количество</span>
      <input class="text-input" id="calcAmount" inputmode="decimal" placeholder="0.00">
      <button class="btn-primary" id="calcSubmit">Рассчитать</button>
      <div class="calc-result" id="calcResult"></div>
      <div class="limit-note" id="calcLimitNote"></div>
    </div>
  </section>

  <!-- ─── PREMIUM ─── -->
  <section class="screen" id="screen-premium">
    <h1>Premium</h1>
    <p class="subtitle">Без ограничений на алерты, портфель и расчёты</p>
    <div id="premiumContent"></div>
  </section>

</main>

<button class="fab" id="fabAdd">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<nav class="tabbar">
  <button class="tab-btn active" data-screen="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V10M12 19V5M20 19v-7"/></svg>
    <span>Рынок</span>
  </button>
  <button class="tab-btn" data-screen="portfolio">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a4 4 0 0 1 8 0v2"/></svg>
    <span>Портфель</span>
  </button>
  <button class="tab-btn" data-screen="alerts">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
    <span>Алерты</span>
  </button>
  <button class="tab-btn" data-screen="calc">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01"/></svg>
    <span>Калькулятор</span>
  </button>
  <button class="tab-btn" data-screen="premium">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l3 6-9 12L3 9Z"/><path d="M3 9h18M9 3l1 6-4 0M15 3l-1 6 4 0"/></svg>
    <span>Premium</span>
  </button>
</nav>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  try {
    tg.setHeaderColor('#0F1620');
    tg.setBackgroundColor('#0F1620');
  } catch(e) {}
}
const INIT_DATA = tg?.initData || '';

const CSS = getComputedStyle(document.documentElement);
const COLOR = {
  amber: CSS.getPropertyValue('--amber').trim(),
  teal: CSS.getPropertyValue('--teal').trim(),
  gain: CSS.getPropertyValue('--gain').trim(),
  loss: CSS.getPropertyValue('--loss').trim(),
  muted: CSS.getPropertyValue('--text-muted').trim(),
  panel2: CSS.getPropertyValue('--panel-2').trim(),
  border: CSS.getPropertyValue('--border').trim(),
};

let STATE = {
  lang: 'ru',
  isPremium: false,
  premiumDaysLeft: 0,
  coins: [],
  coinDisplay: {},
  prices: {},
  watchlist: new Set(),
  portfolio: [],
  alerts: [],
  openChart: null,
};

// ─── Утилиты ───
function fmtUsd(v){
  return '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtNum(v, d=6){
  return Number(v).toLocaleString('en-US', {maximumFractionDigits:d});
}
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2600);
}

async function api(path, opts={}){
  const res = await fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-Init-Data': INIT_DATA,
      ...(opts.headers||{}),
    }
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok){
    throw new Error(data.detail || 'Ошибка запроса');
  }
  return data;
}

// ─── Иконки ───
const ICONS = {
  star: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.7 7-6.3-3.9L5.7 21l1.7-7L2 9.2l7.1-.6L12 2z"/></svg>',
  starOutline: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><path d="M12 2l2.9 6.6 7.1.6-5.4 4.7 1.7 7-6.3-3.9L5.7 21l1.7-7L2 9.2l7.1-.6L12 2z"/></svg>',
  chevron: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-8 0 1 13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1l1-13"/></svg>',
  empty: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M3 11h18M8 3v4M16 3v4"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',
};

// ─── Табы ───
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>switchScreen(btn.dataset.screen));
});
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelector(`.tab-btn[data-screen="${name}"]`).classList.add('active');
  document.getElementById('fabAdd').classList.toggle('hidden', !['portfolio','alerts'].includes(name));
  document.getElementById('fabAdd').dataset.for = name;
  if (name === 'portfolio') renderPortfolio();
  if (name === 'alerts') renderAlerts();
  if (name === 'premium') renderPremium();
  tg?.HapticFeedback?.selectionChanged();
}

// ─── Тикерная лента ───
function renderTicker(){
  const items = STATE.coins.map(sym=>{
    const p = STATE.prices[sym];
    if (!p) return '';
    const dir = p.change_24h >= 0 ? 'up' : 'down';
    const arrow = p.change_24h >= 0 ? '▲' : '▼';
    return `<div class="ticker-item">
      <span class="sym">${STATE.coinDisplay[sym]||sym}</span>
      <span class="val">${fmtUsd(p.usd)}</span>
      <span class="chg ${dir}">${arrow} ${Math.abs(p.change_24h).toFixed(2)}%</span>
    </div>`;
  }).join('');
  document.getElementById('tickerTrack').innerHTML = items + items; // дублируем для бесшовной прокрутки
}

// ─── Dashboard: movers + market list ───
function renderMovers(){
  const arr = STATE.coins.map(sym=>({sym, ...STATE.prices[sym]})).filter(c=>c.usd !== undefined);
  if (!arr.length) return;
  const sorted = [...arr].sort((a,b)=>b.change_24h - a.change_24h);
  const top = sorted[0], worst = sorted[sorted.length-1];
  const card = (c, cls, label) => `
    <div class="mover-card ${cls}">
      <div class="label">${label}</div>
      <div class="sym">${STATE.coinDisplay[c.sym]||c.sym}</div>
      <div class="chg">${c.change_24h>=0?'+':''}${c.change_24h.toFixed(2)}%</div>
    </div>`;
  document.getElementById('moversRow').innerHTML = card(top,'gain','Лидер роста') + card(worst,'loss','Лидер падения');
}

function renderMarketList(){
  const sorted = [...STATE.coins].sort((a,b)=>{
    const aw = STATE.watchlist.has(a) ? 0 : 1;
    const bw = STATE.watchlist.has(b) ? 0 : 1;
    return aw - bw;
  });
  const html = sorted.map(sym=>{
    const p = STATE.prices[sym] || {};
    const dir = (p.change_24h||0) >= 0 ? 'up' : 'down';
    const starred = STATE.watchlist.has(sym);
    const isOpen = STATE.openChart === sym;
    return `
    <div>
      <div class="coin-row" data-sym="${sym}">
        <button class="star-btn ${starred?'active':''}" data-star="${sym}">${starred?ICONS.star:ICONS.starOutline}</button>
        <div class="coin-info">
          <div class="sym">${STATE.coinDisplay[sym]||sym}</div>
        </div>
        <div class="coin-price-block">
          <div class="price mono">${p.usd!==undefined?fmtUsd(p.usd):'—'}</div>
          <div class="chg ${dir}">${p.change_24h!==undefined?((p.change_24h>=0?'+':'')+p.change_24h.toFixed(2)+'%'):''}</div>
        </div>
        <div class="chevron ${isOpen?'open':''}">${ICONS.chevron}</div>
      </div>
      <div class="chart-panel ${isOpen?'open':''}" id="chart-${sym}"><canvas></canvas></div>
    </div>`;
  }).join('');
  document.getElementById('marketList').innerHTML = html;

  document.querySelectorAll('[data-star]').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const sym = btn.dataset.star;
      tg?.HapticFeedback?.impactOccurred('light');
      if (STATE.watchlist.has(sym)){
        STATE.watchlist.delete(sym);
        await api('/api/watchlist/'+sym, {method:'DELETE'}).catch(()=>{});
      } else {
        STATE.watchlist.add(sym);
        await api('/api/watchlist', {method:'POST', body:JSON.stringify({coin:sym})}).catch(()=>{});
      }
      renderMarketList();
    });
  });

  document.querySelectorAll('.coin-row').forEach(row=>{
    row.addEventListener('click', ()=>toggleChart(row.dataset.sym));
  });

  if (STATE.openChart) drawChart(STATE.openChart);
}

async function toggleChart(sym){
  STATE.openChart = STATE.openChart === sym ? null : sym;
  renderMarketList();
}

let chartInstances = {};
async function drawChart(sym){
  try{
    const data = await api('/api/chart/'+sym);
    const points = data.points || [];
    const canvas = document.querySelector(`#chart-${sym} canvas`);
    if (!canvas) return;
    if (chartInstances[sym]) chartInstances[sym].destroy();
    const labels = points.map(p=>new Date(p[0]));
    const values = points.map(p=>p[1]);
    const rising = values[values.length-1] >= values[0];
    chartInstances[sym] = new Chart(canvas, {
      type:'line',
      data:{ labels, datasets:[{ data: values, borderColor: rising?COLOR.gain:COLOR.loss, borderWidth:2, pointRadius:0, fill:true, backgroundColor: (rising?COLOR.gain:COLOR.loss)+'18', tension:0.25 }]},
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{enabled:false}},
        scales:{ x:{display:false}, y:{display:false} },
        elements:{point:{radius:0}}
      }
    });
  }catch(e){ /* тихо игнорируем — не критично */ }
}

// ─── Portfolio ───
let donutChart = null;
async function renderPortfolio(){
  const el = document.getElementById('portfolioContent');
  el.innerHTML = '<div class="spinner"></div>';
  try{
    const data = await api('/api/portfolio');
    STATE.portfolio = data.items;
    if (!data.items.length){
      el.innerHTML = `
        <div class="empty-state">
          <div class="big-icon">${ICONS.empty}</div>
          <p>Портфель пуст. Добавь монету, чтобы отслеживать её стоимость.</p>
        </div>`;
      return;
    }
    const palette = [COLOR.amber, COLOR.teal, COLOR.gain, COLOR.loss, '#8B7FD6', '#D68FC9'];
    const legend = data.items.map((it,i)=>`
      <div class="legend-item">
        <span class="legend-dot" style="background:${palette[i%palette.length]}"></span>
        <span class="sym">${it.display}</span>
        <span class="pct">${data.total_value? ((it.value/data.total_value)*100).toFixed(1):'0'}%</span>
      </div>`).join('');
    const rows = data.items.map(it=>`
      <div class="item-row">
        <div class="left">
          <div class="sym">${it.display}</div>
          <div class="sub">${fmtNum(it.amount)} · ${it.change_24h>=0?'+':''}${it.change_24h.toFixed(2)}%</div>
        </div>
        <div class="right">
          <span class="val">${fmtUsd(it.value)}</span>
          <button class="del-btn" data-del-portfolio="${it.id}">${ICONS.trash}</button>
        </div>
      </div>`).join('');
    el.innerHTML = `
      <div class="card">
        <div class="total-label">Общая стоимость</div>
        <div class="total-value">${fmtUsd(data.total_value)}</div>
        <div class="donut-wrap">
          <canvas id="donutCanvas"></canvas>
          <div class="legend">${legend}</div>
        </div>
      </div>
      <div class="card" style="padding:4px 14px;">${rows}</div>
    `;
    if (donutChart) donutChart.destroy();
    donutChart = new Chart(document.getElementById('donutCanvas'), {
      type:'doughnut',
      data:{ labels: data.items.map(i=>i.display), datasets:[{ data: data.items.map(i=>i.value), backgroundColor: palette, borderWidth:0 }]},
      options:{ cutout:'68%', plugins:{legend:{display:false}, tooltip:{enabled:false}} }
    });
    document.querySelectorAll('[data-del-portfolio]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        await api('/api/portfolio/'+btn.dataset.delPortfolio, {method:'DELETE'});
        tg?.HapticFeedback?.impactOccurred('light');
        renderPortfolio();
      });
    });
  }catch(e){
    el.innerHTML = `<div class="empty-state"><p>Не получилось загрузить портфель.</p></div>`;
  }
}

// ─── Alerts ───
async function renderAlerts(){
  const el = document.getElementById('alertsContent');
  el.innerHTML = '<div class="spinner"></div>';
  try{
    const data = await api('/api/alerts');
    STATE.alerts = data.items;
    if (!data.items.length){
      el.innerHTML = `
        <div class="empty-state">
          <div class="big-icon">${ICONS.empty}</div>
          <p>Нет активных алертов. Добавь первый, чтобы не пропустить нужную цену.</p>
        </div>`;
      return;
    }
    const rows = data.items.map(a=>`
      <div class="item-row">
        <div class="left">
          <div class="sym">${a.display}</div>
          <div class="sub">${a.kind === 'percent'
            ? `📊 ${a.direction === 'above' ? 'рост' : 'падение'} на ${a.percent}% (цель ${fmtUsd(a.price)})`
            : `${a.direction === 'above' ? 'выше' : 'ниже'} ${fmtUsd(a.price)}`}</div>
        </div>
        <div class="right">
          <button class="del-btn" data-del-alert="${a.id}">${ICONS.trash}</button>
        </div>
      </div>`).join('');
    el.innerHTML = `<div class="card" style="padding:4px 14px;">${rows}</div>`;
    document.querySelectorAll('[data-del-alert]').forEach(btn=>{
      btn.addEventListener('click', async ()=>{
        await api('/api/alerts/'+btn.dataset.delAlert, {method:'DELETE'});
        tg?.HapticFeedback?.impactOccurred('light');
        renderAlerts();
      });
    });
  }catch(e){
    el.innerHTML = `<div class="empty-state"><p>Не получилось загрузить алерты.</p></div>`;
  }
}

// ─── Calculator ───
let calcSelectedCoin = null;
function renderCalcChips(){
  const wrap = document.getElementById('calcCoinChips');
  wrap.innerHTML = STATE.coins.map(sym=>`<button class="chip" data-calc-coin="${sym}">${STATE.coinDisplay[sym]||sym}</button>`).join('');
  wrap.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      calcSelectedCoin = chip.dataset.calcCoin;
      wrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
}
document.getElementById('calcSubmit').addEventListener('click', async ()=>{
  const amount = parseFloat(document.getElementById('calcAmount').value.replace(',','.'));
  if (!calcSelectedCoin){ showToast('Выбери монету'); return; }
  if (!amount || amount <= 0){ showToast('Введи количество'); return; }
  try{
    const data = await api('/api/calculate', {method:'POST', body:JSON.stringify({coin:calcSelectedCoin, amount})});
    const rows = Object.entries(data.conversions).map(([sym,val])=>`
      <div class="calc-row">
        <span class="sym">${sym==='USD'?'USD':(STATE.coinDisplay[sym]||sym)}</span>
        <span class="amount">${sym==='USD'?fmtUsd(val):fmtNum(val)}</span>
      </div>`).join('');
    document.getElementById('calcResult').innerHTML = rows;
    const note = document.getElementById('calcLimitNote');
    note.textContent = data.unlimited ? '' : `Использовано ${data.used} из ${data.limit} бесплатных расчётов`;
    tg?.HapticFeedback?.notificationOccurred('success');
  }catch(e){
    showToast(e.message);
    if (String(e.message).includes('Premium') || String(e.message).includes('оформи')) switchToPremiumHint();
  }
});
function switchToPremiumHint(){
  setTimeout(()=>switchScreen('premium'), 900);
}

// ─── Premium ───
async function renderPremium(){
  const el = document.getElementById('premiumContent');
  const featureList = `
    <div class="feature-list">
      <div class="feature-item"><span class="check">${ICONS.check}</span> Безлимитные алерты по цене и %</div>
      <div class="feature-item"><span class="check">${ICONS.check}</span> Безлимитные монеты в портфеле</div>
      <div class="feature-item"><span class="check">${ICONS.check}</span> Безлимитные расчёты в калькуляторе</div>
      <div class="feature-item"><span class="check">${ICONS.check}</span> Приоритетная поддержка</div>
    </div>`;

  if (STATE.isPremium){
    el.innerHTML = `
      <div class="premium-hero">
        <div class="active-badge">${ICONS.check} Premium активен</div>
        <div class="price">${STATE.premiumDaysLeft} <span>дней осталось</span></div>
      </div>
      ${featureList}
      <div id="referralCard"></div>
    `;
    renderReferralCard();
    return;
  }

  el.innerHTML = `
    <div class="premium-hero">
      <div class="gem">${ICONS.check}</div>
      <div class="price">$4 <span>/ месяц</span></div>
    </div>
    ${featureList}
    <button class="btn-primary" id="buyPremiumBtn">Оформить Premium</button>
    <div id="referralCard"></div>
  `;
  document.getElementById('buyPremiumBtn').addEventListener('click', buyPremium);
  renderReferralCard();
}

async function renderReferralCard(){
  const holder = document.getElementById('referralCard');
  if (!holder) return;
  try{
    const data = await api('/api/referral');
    holder.innerHTML = `
      <div class="referral-card">
        <div class="referral-title">🎁 Пригласи друга</div>
        <div class="referral-sub">Ты и друг получите по +${data.bonus} расчётов в калькуляторе</div>
        <div class="referral-link-row">
          <span class="referral-link mono">${data.link || '...'}</span>
          <button class="referral-copy-btn" id="copyRefBtn">Копировать</button>
        </div>
        <div class="referral-count">👥 Приглашено друзей: <strong>${data.count}</strong></div>
      </div>
    `;
    document.getElementById('copyRefBtn').addEventListener('click', ()=>{
      navigator.clipboard?.writeText(data.link);
      showToast('Ссылка скопирована');
      tg?.HapticFeedback?.impactOccurred('light');
    });
  }catch(e){ /* тихо игнорируем, если не удалось получить ссылку */ }
}

async function buyPremium(){
  try{
    const data = await api('/api/premium/create-invoice', {method:'POST'});
    if (tg?.openLink) tg.openLink(data.invoice_url); else window.open(data.invoice_url, '_blank');
    const el = document.getElementById('premiumContent');
    el.insertAdjacentHTML('beforeend', `
      <button class="btn-secondary" id="checkPaymentBtn" data-pid="${data.payment_id}">Я оплатил — проверить</button>
    `);
    document.getElementById('checkPaymentBtn').addEventListener('click', async (e)=>{
      const pid = e.target.dataset.pid;
      try{
        const res = await api('/api/premium/check/'+pid, {method:'POST'});
        if (res.confirmed){
          STATE.isPremium = true;
          showToast('Premium активирован 🎉');
          tg?.HapticFeedback?.notificationOccurred('success');
          renderPremium();
        } else {
          showToast('Оплата пока не подтверждена, подожди немного');
        }
      }catch(err){ showToast(err.message); }
    });
  }catch(e){ showToast(e.message); }
}

// ─── FAB (добавление в портфель/алерты) ───
document.getElementById('fabAdd').addEventListener('click', ()=>{
  const target = document.getElementById('fabAdd').dataset.for;
  if (target === 'portfolio') openAddPortfolioSheet();
  if (target === 'alerts') openAddAlertSheet();
});

function openSheet(html){
  document.getElementById('sheet').innerHTML = `<div class="sheet-handle"></div>` + html;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('sheetBackdrop').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('sheetBackdrop').classList.remove('open');
}
document.getElementById('sheetBackdrop').addEventListener('click', closeSheet);

function openAddPortfolioSheet(){
  let selected = null;
  openSheet(`
    <h3>Добавить монету в портфель</h3>
    <span class="field-label">Монета</span>
    <div class="chip-row" id="sheetCoinChips"></div>
    <span class="field-label">Количество</span>
    <input class="text-input" id="sheetAmount" inputmode="decimal" placeholder="0.00">
    <button class="btn-primary" id="sheetSubmit">Добавить</button>
  `);
  const chipsWrap = document.getElementById('sheetCoinChips');
  chipsWrap.innerHTML = STATE.coins.map(sym=>`<button class="chip" data-c="${sym}">${STATE.coinDisplay[sym]||sym}</button>`).join('');
  chipsWrap.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      selected = chip.dataset.c;
      chipsWrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
  document.getElementById('sheetSubmit').addEventListener('click', async ()=>{
    const amount = parseFloat(document.getElementById('sheetAmount').value.replace(',','.'));
    if (!selected){ showToast('Выбери монету'); return; }
    if (!amount || amount <= 0){ showToast('Введи количество'); return; }
    try{
      await api('/api/portfolio', {method:'POST', body:JSON.stringify({coin:selected, amount})});
      closeSheet();
      tg?.HapticFeedback?.notificationOccurred('success');
      renderPortfolio();
    }catch(e){
      showToast(e.message);
    }
  });
}

function openAddAlertSheet(){
  let selected = null, direction = null, kind = 'price';
  openSheet(`
    <h3>Новый алерт</h3>
    <span class="field-label">Монета</span>
    <div class="chip-row" id="sheetCoinChips2"></div>
    <span class="field-label">Что отслеживаем</span>
    <div class="chip-row">
      <button class="chip selected" data-kind="price">💲 Цена</button>
      <button class="chip" data-kind="percent">📊 Изменение в %</button>
    </div>
    <div id="priceKindFields">
      <span class="field-label">Целевая цена, USD</span>
      <input class="text-input" id="sheetPrice" inputmode="decimal" placeholder="0.00">
      <span class="field-label">Когда уведомить</span>
      <div class="toggle-row">
        <button class="toggle-btn" data-dir="above">📈 Выше цены</button>
        <button class="toggle-btn" data-dir="below">📉 Ниже цены</button>
      </div>
    </div>
    <div id="percentKindFields" style="display:none;">
      <span class="field-label">Изменение, %</span>
      <input class="text-input" id="sheetPercent" inputmode="decimal" placeholder="5">
      <span class="field-label">В какую сторону</span>
      <div class="toggle-row">
        <button class="toggle-btn" data-dir="above">📈 Рост</button>
        <button class="toggle-btn" data-dir="below">📉 Падение</button>
      </div>
    </div>
    <button class="btn-primary" id="sheetSubmit2">Создать алерт</button>
  `);
  const chipsWrap = document.getElementById('sheetCoinChips2');
  chipsWrap.innerHTML = STATE.coins.map(sym=>`<button class="chip" data-c="${sym}">${STATE.coinDisplay[sym]||sym}</button>`).join('');
  chipsWrap.querySelectorAll('.chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      selected = chip.dataset.c;
      chipsWrap.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');
    });
  });
  document.querySelectorAll('[data-kind]').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      kind = chip.dataset.kind;
      document.querySelectorAll('[data-kind]').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');
      document.getElementById('priceKindFields').style.display = kind === 'price' ? '' : 'none';
      document.getElementById('percentKindFields').style.display = kind === 'percent' ? '' : 'none';
      direction = null;
      document.querySelectorAll('[data-dir]').forEach(b=>b.classList.remove('selected','above','below'));
    });
  });
  document.querySelectorAll('[data-dir]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      direction = btn.dataset.dir;
      // сбрасываем выделение только в текущей видимой группе полей
      const group = btn.closest('#priceKindFields, #percentKindFields');
      group.querySelectorAll('[data-dir]').forEach(b=>b.classList.remove('selected','above','below'));
      btn.classList.add('selected', direction);
    });
  });
  document.getElementById('sheetSubmit2').addEventListener('click', async ()=>{
    if (!selected){ showToast('Выбери монету'); return; }
    if (!direction){ showToast('Выбери направление'); return; }
    let payload = { coin:selected, direction, kind };
    if (kind === 'price'){
      const price = parseFloat(document.getElementById('sheetPrice').value.replace(',','.'));
      if (!price || price <= 0){ showToast('Введи цену'); return; }
      payload.price = price;
    } else {
      const percent = parseFloat(document.getElementById('sheetPercent').value.replace(',','.'));
      if (!percent || percent <= 0){ showToast('Введи процент'); return; }
      payload.percent = percent;
    }
    try{
      await api('/api/alerts', {method:'POST', body:JSON.stringify(payload)});
      closeSheet();
      tg?.HapticFeedback?.notificationOccurred('success');
      renderAlerts();
    }catch(e){
      showToast(e.message);
    }
  });
}

// ─── Сюрприз ─── (для одного конкретного юзера, см. SURPRISE_USERNAME на бэкенде)
function showSurprise(){
  const overlay = document.getElementById('surpriseOverlay');
  overlay.classList.remove('hidden');
  requestAnimationFrame(()=> overlay.classList.add('show'));
  tg?.HapticFeedback?.notificationOccurred('success');
  overlay.addEventListener('click', ()=>{
    overlay.classList.remove('show');
    setTimeout(()=> overlay.classList.add('hidden'), 300);
  }, { once:true });
}

// ─── Админ-панель ───
async function openAdminSheet(){
  openSheet(`<h3>👑 Админ-панель</h3><div id="adminSheetBody"><div class="spinner"></div></div>`);
  try{
    const data = await api('/api/admin/stats');
    const s = data.stats;
    const onlineRows = data.online_users.length
      ? data.online_users.map(u=>`
          <div class="online-row">
            <span class="live-dot"></span>
            <span class="uname">@${u.username}${u.premium ? ' 💎' : ''}</span>
            <span class="ago">${u.seconds_ago < 60 ? 'сейчас' : Math.floor(u.seconds_ago/60)+' мин назад'}</span>
          </div>`).join('')
      : `<p style="color:var(--text-muted); font-size:0.86rem;">Сейчас никто не в сети</p>`;

    document.getElementById('adminSheetBody').innerHTML = `
      <div class="admin-stat-grid">
        <div class="admin-stat-card"><div class="num">${s.total}</div><div class="lbl">Всего юзеров</div></div>
        <div class="admin-stat-card"><div class="num">${s.online}</div><div class="lbl">Онлайн сейчас</div></div>
        <div class="admin-stat-card"><div class="num">${s.active_today}</div><div class="lbl">Активны сегодня</div></div>
        <div class="admin-stat-card"><div class="num">${s.premium}</div><div class="lbl">Premium</div></div>
      </div>
      <span class="field-label">🟢 Онлайн (последние 5 минут)</span>
      <div style="margin-bottom:8px;">${onlineRows}</div>
    `;
  }catch(e){
    document.getElementById('adminSheetBody').innerHTML = `<p style="color:var(--loss); font-size:0.86rem;">Не удалось загрузить: ${e.message}</p>`;
  }
}

// ─── Инициализация ───
async function init(){
  try{
    const initData = await api('/api/init');
    STATE.lang = initData.lang;
    STATE.isPremium = initData.is_premium;
    STATE.premiumDaysLeft = initData.premium_days_left;
    STATE.coins = initData.coins;
    STATE.coinDisplay = initData.coin_display;
    STATE.isAdmin = initData.is_admin;

    if (STATE.isAdmin){
      const btn = document.getElementById('adminProfileBtn');
      btn.classList.remove('hidden');
      btn.addEventListener('click', openAdminSheet);
    }

    if (initData.show_surprise){
      setTimeout(showSurprise, 700);
    }

    const watchlistData = await api('/api/watchlist');
    STATE.watchlist = new Set(watchlistData.items.map(i=>i.coin));

    const prices = await api('/api/prices');
    STATE.prices = prices;

    renderTicker();
    renderMovers();
    renderMarketList();
    renderCalcChips();

    setInterval(async ()=>{
      try{
        STATE.prices = await api('/api/prices');
        renderTicker();
        renderMovers();
        renderMarketList();
      }catch(e){}
    }, 30000);
  }catch(e){
    document.getElementById('marketList').innerHTML = `<div class="empty-state"><p>Не получилось загрузить данные. Перезайди в приложение через бота.</p></div>`;
  }
}
init();
</script>
